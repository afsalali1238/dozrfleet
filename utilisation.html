<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dozr Fleet — Utilisation</title>
  <meta name="description" content="Dozr Fleet utilisation and idle-time monitoring.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body data-page="utilisation">
  <a class="skip-link" href="#main-content">Skip to content</a>
  <h1 class="sr-only">Dozr Fleet — Utilisation</h1>
  <header class="site-nav">
    <div class="container">
      <a class="logo" href="index.html" aria-label="Dozr Fleet home">
        <span class="logo-mark"><svg width="20" height="20" viewBox="0 0 32 32" fill="none" aria-hidden="true"><path d="M12 6c-2 0-3.2 1.3-3.2 3.4V18.5h4.4V11c0-1.1.5-1.7 1.5-1.7H17V6z" fill="var(--yellow)"/><path d="M14.5 14.5 21.5 18" stroke="var(--yellow)" stroke-width="3" stroke-linecap="round"/><circle cx="22.5" cy="20.5" r="2.6" fill="var(--yellow)"/><path d="M6.5 24H18" stroke="var(--yellow)" stroke-width="3" stroke-linecap="round"/></svg></span>
        <span>dozr fleet</span>
      </a>
      <nav class="links" aria-label="Primary">
        <a href="index.html">Fleet Map</a>
        <a href="fuel.html">Fuel</a>
        <a href="maintenance.html">Maintenance</a>
        <a href="geofences.html">Geofences</a>
        <a href="utilisation.html" aria-current="page">Utilisation</a>
        <a href="cost-roi.html">Cost &amp; ROI</a>
        <a href="reports.html">Reports</a>
      </nav>
      <div class="nav-actions">
        <label class="search-field" for="fleet-search">
          <span class="eyebrow">Search</span>
          <input id="fleet-search" type="search" placeholder="Search assets">
        </label>
        <span class="live-pill" data-live-status>Live sync</span>
        <span class="alert-badge" data-alert-count>2 alerts</span>
        <button class="btn btn-primary" type="button">+ Add Asset</button>
      </div>
    </div>
  </header>

  <main id="main-content">
    <section class="container page-shell">
      <section class="summary-grid" id="summary-strip" aria-label="Utilisation summary"></section>
      <section class="panel" aria-labelledby="breakdown-heading">
        <div class="panel-header">
          <h2 id="breakdown-heading">Utilisation breakdown</h2>
          <span class="status-chip" data-status="ok">Live</span>
        </div>
        <div class="panel-body">
          <div class="summary-grid" id="breakdown-cards"></div>
        </div>
      </section>
      <section class="panel" aria-labelledby="today-heading">
        <div class="panel-header">
          <h2 id="today-heading">Today's Utilisation</h2>
        </div>
        <div class="panel-body">
          <div class="summary-grid" id="utilisation-bars"></div>
        </div>
      </section>
      <section class="panel" aria-labelledby="trend-heading">
        <div class="panel-header">
          <h2 id="trend-heading">7-Day Trend</h2>
        </div>
        <div class="panel-body chart">
          <div id="trend-chart"></div>
        </div>
      </section>
    </section>
  </main>

  <script src="data/fleet.js" defer></script>
  <script src="js/main.js" defer></script>
</body>
</html>

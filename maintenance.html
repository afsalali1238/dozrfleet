    <div class="app-content">
      <header class="app-header">
        <button class="nav-toggle" type="button" data-nav-toggle aria-expanded="false">Menu</button>
        <div class="nav-actions">

        <label class="search-field" for="fleet-search">
          <span class="eyebrow sr-only">Search</span>
          <input id="fleet-search" type="search" placeholder="Search assets">
        </label>
        <span class="status-combo">
          <span data-live-status>Live sync</span>
          <span class="dot-sep" aria-hidden="true">&middot;</span>
          <span data-alert-count>2 alerts</span>
        </span>
        <button class="btn btn-primary" type="button">Book service</button>
      
        </div>

    <section class="container page-shell">
      <section class="summary-grid" id="summary-strip" aria-label="Maintenance summary"></section>
      <section class="panel" aria-labelledby="schedule-heading">
        <div class="panel-header">
          <h2 id="schedule-heading">Maintenance Schedule — All Assets</h2>
          <button class="btn btn-secondary" type="button">Book service</button>
        </div>
        <div class="panel-body table-wrap">
          <table>
            <thead>
              <tr>
                <th scope="col">Asset</th>
                <th scope="col">Type</th>
                <th scope="col">Service Item</th>
                <th scope="col">Last / Due</th>
                <th scope="col">Current</th>
                <th scope="col">Status</th>
                <th scope="col">Action</th>
              </tr>
            </thead>
            <tbody id="maintenance-table-body"></tbody>
          </table>
        </div>
      </section>
    </section>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dozr Fleet — Trip History & Playback</title>
  <meta name="description" content="Dozr Fleet trip playback and historical route analysis.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <style>
    .scrubber-container {
      margin-top: 16px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
    }
    .scrubber-track {
      position: relative;
      width: 100%;
      height: 6px;
      background: var(--line);
      border-radius: 3px;
      margin: 16px 0;
    }
    .scrubber-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: var(--green);
      border-radius: 3px;
      width: 0%;
    }
    .scrubber-handle {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 16px;
      background: var(--surface);
      border: 2px solid var(--ink);
      border-radius: 50%;
      cursor: pointer;
      left: 0%;
    }
    .scrubber-event {
      position: absolute;
      top: -12px;
      width: 8px;
      height: 8px;
      background: var(--error);
      border-radius: 50%;
      transform: translateX(-50%);
    }
    .playback-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }
  </style>
</head>
<body data-page="trip-history">
  <a class="skip-link" href="#main-content">Skip to content</a>
  <h1 class="sr-only">Dozr Fleet — Trip History & Playback</h1>
  <header class="site-nav">
    <div class="container">
      <a class="logo" href="index.html" aria-label="Dozr Fleet home">
        <span class="logo-mark"><svg width="20" height="20" viewBox="0 0 32 32" fill="none" aria-hidden="true"><path d="M12 6c-2 0-3.2 1.3-3.2 3.4V18.5h4.4V11c0-1.1.5-1.7 1.5-1.7H17V6z" fill="var(--yellow)"/><path d="M14.5 14.5 21.5 18" stroke="var(--yellow)" stroke-width="3" stroke-linecap="round"/><circle cx="22.5" cy="20.5" r="2.6" fill="var(--yellow)"/><path d="M6.5 24H18" stroke="var(--yellow)" stroke-width="3" stroke-linecap="round"/></svg></span>
        <span>dozr fleet</span>
      </a>
      <nav class="links" aria-label="Primary" data-nav-menu data-open="false">
        <a href="index.html">Fleet Map</a>
        <a href="fuel.html">Fuel</a>
        <a href="maintenance.html">Maintenance</a>
        <a href="geofences.html">Geofences</a>
        <a href="utilisation.html">Utilisation</a>
        <a href="trip-history.html" aria-current="page">Trip History</a>
        <a href="timesheet.html">Timesheet</a>
        <a href="alerts.html">Alerts Center</a>
        <a href="cost-roi.html">Cost &amp; ROI</a>
        <a href="reports.html">Reports</a>
      </nav>
      <button class="nav-toggle" type="button" data-nav-toggle aria-expanded="false">Menu</button>
      <div class="nav-actions">
        <label class="search-field" for="fleet-search">
          <span class="eyebrow sr-only">Search</span>
          <input id="fleet-search" type="search" placeholder="Search assets">
        </label>
        <span class="status-combo">
          <span data-live-status>Live sync</span>
          <span class="dot-sep" aria-hidden="true">&middot;</span>
          <span data-alert-count>2 alerts</span>
        </span>
        <button class="btn btn-primary" type="button">+ Add Asset</button>
      </div>
    </div>
  </header>

  <main id="main-content">
    <section class="container page-shell">
      <div class="sidebar-layout">
        <aside class="panel">
          <div class="panel-header">
            <h3>Trip Selection</h3>
          </div>
          <div class="panel-body" style="display: flex; flex-direction: column; gap: 16px;">
            <label style="display: flex; flex-direction: column; gap: 4px;">
              <span class="eyebrow">Vehicle</span>
              <select id="trip-vehicle-select" class="search-field" style="height: 40px; padding: 0 12px; border: 1px solid var(--line); border-radius: 8px;">
                <!-- Populated by JS -->
              </select>
            </label>
            <label style="display: flex; flex-direction: column; gap: 4px;">
              <span class="eyebrow">Date</span>
              <input type="date" id="trip-date-select" value="2026-07-09" class="search-field" style="height: 40px; padding: 0 12px; border: 1px solid var(--line); border-radius: 8px;">
            </label>
          </div>
          <div class="panel-header" style="margin-top: 16px; border-top: 1px solid var(--line); padding-top: 16px;">
            <h3>Trip Details</h3>
          </div>
          <div class="panel-body" id="trip-details-panel">
            <p class="text-muted">Select a vehicle and date to view trip history.</p>
          </div>
        </aside>

        <div class="page-shell">
          <section class="panel map-card" aria-label="Trip playback view" style="flex: 1; display: flex; flex-direction: column;">
            <div class="map-surface" role="img" aria-label="Trip route map" style="flex: 1; min-height: 400px; position: relative;">
              <svg viewBox="0 0 640 480" aria-hidden="true" id="trip-map-svg">
                <rect x="0" y="0" width="640" height="480" fill="rgba(255,255,255,0.35)"></rect>
                <!-- Route polyline rendered here -->
              </svg>
              <div id="trip-map-markers" class="map-markers"></div>
            </div>
            
            <div class="scrubber-container">
              <div class="playback-controls">
                <button class="btn btn-secondary" id="trip-play-btn" type="button" style="min-width: 80px;">Play</button>
                <div style="flex: 1;">
                  <div style="display: flex; justify-content: space-between; font-size: 13px; font-family: 'Space Mono', monospace; color: var(--slate);">
                    <span id="trip-start-time">--:--</span>
                    <span id="trip-current-time" style="color: var(--ink); font-weight: bold;">--:--</span>
                    <span id="trip-end-time">--:--</span>
                  </div>
                  <div class="scrubber-track" id="trip-scrubber-track">
                    <div class="scrubber-fill" id="trip-scrubber-fill"></div>
                    <!-- Event markers go here -->
                    <div class="scrubber-handle" id="trip-scrubber-handle" tabindex="0" role="slider" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>
    </section>
  </main>

  <script src="data/fleet.js" defer></script>
  <script src="js/main.js" defer></script>
</body>
</html>
